<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For You, Mother Dearest</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #fce4ec, #f8bbd0, #f48fb1, #f06292);
            background-size: 400% 400%;
            animation: gradientShift 8s ease infinite;
            font-family: 'Georgia', serif;
            overflow: hidden;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            text-align: center;
            padding: 40px;
            position: relative;
            z-index: 2;
        }

        .heart-container {
            position: relative;
            display: inline-block;
            margin-bottom: 30px;
        }

        .heart {
            width: 200px;
            height: 200px;
            animation: heartbeat 1.2s ease-in-out infinite;
            filter: drop-shadow(0 10px 30px rgba(211, 47, 47, 0.5));
        }

        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            15% { transform: scale(1.15); }
            30% { transform: scale(1); }
            45% { transform: scale(1.1); }
            60% { transform: scale(1); }
        }

        .message {
            font-size: 2.8rem;
            color: #fff;
            text-shadow: 2px 2px 10px rgba(0, 0, 0, 0.2);
            margin-bottom: 20px;
            animation: fadeInUp 1.5s ease forwards;
            opacity: 0;
            line-height: 1.4;
        }

        .signature {
            font-size: 1.6rem;
            color: #fff;
            font-style: italic;
            text-shadow: 1px 1px 8px rgba(0, 0, 0, 0.15);
            animation: fadeInUp 1.5s ease 0.5s forwards;
            opacity: 0;
            margin-top: 10px;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Floating hearts background */
        .floating-heart {
            position: fixed;
            color: rgba(255, 255, 255, 0.3);
            font-size: 24px;
            animation: floatUp linear infinite;
            pointer-events: none;
            z-index: 1;
        }

        @keyframes floatUp {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
        }

        /* Sparkle effect */
        .sparkle {
            position: fixed;
            width: 6px;
            height: 6px;
            background: #fff;
            border-radius: 50%;
            pointer-events: none;
            animation: sparkle 2s ease-in-out infinite;
            z-index: 1;
        }

        @keyframes sparkle {
            0%, 100% { opacity: 0; transform: scale(0); }
            50% { opacity: 1; transform: scale(1); }
        }

        /* Black cat */
        .cat {
            position: fixed;
            bottom: 20px;
            z-index: 10;
            pointer-events: none;
            animation: runAcross 2.5s linear forwards;
        }
        .cat.from-right {
            animation: runAcrossRight 2.5s linear forwards;
        }
        @keyframes runAcross {
            0% { left: -120px; }
            100% { left: 110vw; }
        }
        @keyframes runAcrossRight {
            0% { left: calc(100vw + 120px); transform: scaleX(-1); }
            100% { left: -120px; transform: scaleX(-1); }
        }
        .cat svg {
            width: 100px;
            height: 60px;
            animation: catBounce 0.25s ease-in-out infinite alternate;
        }
        @keyframes catBounce {
            0% { transform: translateY(0); }
            100% { transform: translateY(-8px); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="heart-container">
            <svg class="heart" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <linearGradient id="heartGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" style="stop-color:#e53935"/>
                        <stop offset="50%" style="stop-color:#d32f2f"/>
                        <stop offset="100%" style="stop-color:#c62828"/>
                    </linearGradient>
                </defs>
                <path d="M50 88 C25 65, 2 45, 2 28 C2 14, 13 2, 27 2 C35 2, 43 7, 50 16 C57 7, 65 2, 73 2 C87 2, 98 14, 98 28 C98 45, 75 65, 50 88Z"
                      fill="url(#heartGrad)" stroke="none"/>
                <path d="M30 22 C22 22, 14 30, 18 40"
                      fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="3" stroke-linecap="round"/>
            </svg>
        </div>
        <div class="message">I Love You<br>Mother Dearest</div>
        <div class="signature">From Your Lil Monkey Z</div>
    </div>

    <script>
        // Create floating hearts
        function createFloatingHeart() {
            const heart = document.createElement('div');
            heart.className = 'floating-heart';
            heart.innerHTML = ['&#10084;', '&#10083;', '&#9829;'][Math.floor(Math.random() * 3)];
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.fontSize = (Math.random() * 20 + 14) + 'px';
            heart.style.animationDuration = (Math.random() * 6 + 6) + 's';
            heart.style.animationDelay = (Math.random() * 2) + 's';
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), 14000);
        }

        // Create sparkles
        function createSparkle() {
            const sparkle = document.createElement('div');
            sparkle.className = 'sparkle';
            sparkle.style.left = Math.random() * 100 + 'vw';
            sparkle.style.top = Math.random() * 100 + 'vh';
            sparkle.style.animationDuration = (Math.random() * 2 + 1) + 's';
            sparkle.style.animationDelay = (Math.random() * 2) + 's';
            document.body.appendChild(sparkle);
            setTimeout(() => sparkle.remove(), 4000);
        }

        // Initial batch
        for (let i = 0; i < 10; i++) {
            setTimeout(createFloatingHeart, i * 300);
            setTimeout(createSparkle, i * 200);
        }

        // Continuous generation
        setInterval(createFloatingHeart, 800);
        setInterval(createSparkle, 500);

        // Black cat that runs across the screen
        function createCat() {
            const cat = document.createElement('div');
            const fromRight = Math.random() > 0.5;
            cat.className = 'cat' + (fromRight ? ' from-right' : '');
            cat.style.bottom = (Math.random() * 60 + 10) + 'px';
            cat.innerHTML = `
                <svg viewBox="0 0 120 70" xmlns="http://www.w3.org/2000/svg">
                    <!-- Tail -->
                    <path d="M10 30 C0 15, 5 5, 15 10" stroke="#1a1a1a" stroke-width="3" fill="none" stroke-linecap="round">
                        <animate attributeName="d" values="M10 30 C0 15, 5 5, 15 10;M10 30 C-5 20, 0 8, 12 12;M10 30 C0 15, 5 5, 15 10" dur="0.4s" repeatCount="indefinite"/>
                    </path>
                    <!-- Body -->
                    <ellipse cx="45" cy="38" rx="30" ry="18" fill="#1a1a1a"/>
                    <!-- Head -->
                    <circle cx="82" cy="28" r="16" fill="#1a1a1a"/>
                    <!-- Ears -->
                    <polygon points="72,16 76,2 82,14" fill="#1a1a1a"/>
                    <polygon points="86,14 92,2 96,16" fill="#1a1a1a"/>
                    <polygon points="74,15 77,5 81,13" fill="#2a2a2a"/>
                    <polygon points="87,13 91,5 94,15" fill="#2a2a2a"/>
                    <!-- Eyes -->
                    <ellipse cx="78" cy="26" rx="3" ry="3.5" fill="#4CAF50"/>
                    <ellipse cx="90" cy="26" rx="3" ry="3.5" fill="#4CAF50"/>
                    <ellipse cx="78" cy="26" rx="1.5" ry="3.5" fill="#111"/>
                    <ellipse cx="90" cy="26" rx="1.5" ry="3.5" fill="#111"/>
                    <!-- Nose -->
                    <polygon points="83,30 85,32 81,32" fill="#e57373"/>
                    <!-- Front legs (animated) -->
                    <line x1="60" y1="52" x2="64" y2="65" stroke="#1a1a1a" stroke-width="4" stroke-linecap="round">
                        <animate attributeName="x2" values="68;58;68" dur="0.25s" repeatCount="indefinite"/>
                    </line>
                    <line x1="70" y1="52" x2="72" y2="65" stroke="#1a1a1a" stroke-width="4" stroke-linecap="round">
                        <animate attributeName="x2" values="66;76;66" dur="0.25s" repeatCount="indefinite"/>
                    </line>
                    <!-- Back legs (animated) -->
                    <line x1="28" y1="50" x2="30" y2="65" stroke="#1a1a1a" stroke-width="4" stroke-linecap="round">
                        <animate attributeName="x2" values="34;24;34" dur="0.25s" repeatCount="indefinite"/>
                    </line>
                    <line x1="38" y1="50" x2="40" y2="65" stroke="#1a1a1a" stroke-width="4" stroke-linecap="round">
                        <animate attributeName="x2" values="34;44;34" dur="0.25s" repeatCount="indefinite"/>
                    </line>
                </svg>
            `;
            document.body.appendChild(cat);
            setTimeout(() => cat.remove(), 3000);
        }

        // Run cat at random intervals (every 4-10 seconds)
        function scheduleCat() {
            const delay = Math.random() * 6000 + 4000;
            setTimeout(() => {
                createCat();
                scheduleCat();
            }, delay);
        }
        // First cat after 2 seconds
        setTimeout(() => { createCat(); scheduleCat(); }, 2000);
    </script>
</body>
</html>
